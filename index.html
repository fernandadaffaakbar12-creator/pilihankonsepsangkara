<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Prompt Sangkara</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>✨ Galeri Prompt Sangkara ✨</h1>
        <p>Kumpulan ide dan hasil foto yang seru dan realistic!</p>
    </header>

    <div class="filters">
        <button class="filter-btn active" data-category="semua">🌟 Semua</button>
        <button class="filter-btn" data-category="terbaru">🔥 Terbaru</button>
        <button class="filter-btn" data-category="pasangan">👫 Pasangan/random</button>
        <button class="filter-btn" data-category="pria">👨 Pria</button>
        <button class="filter-btn" data-category="wanita">👩 Wanita</button>
    </div>

    <main id="gallery-container" class="gallery"></main>

    <script src="script.js"></script>
</body>
</html>
